<html ng-app>
<head>
    <title>Email Validation</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body>

    <form name="myForm">

        <label>Email:</label>
        <input type="email" name="email" ng-model="email" required>

        <p style="color:red" ng-show="myForm.email.$error.required">
            Email is required
        </p>

        <p style="color:red" ng-show="myForm.email.$error.email">
            Invalid email format
        </p>

    </form>

</body>
</html>
